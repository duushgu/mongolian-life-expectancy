<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mongolische Lebenserwartung (1920–2025)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <button
          class="theme-toggle"
          type="button"
          aria-label="Hell- und Dunkelmodus umschalten"
        ></button>
        <header class="header">
          <h2>Mongolische Lebenserwartung (1920–2025)</h2>
        </header>
        <div class="chart-wrap">
          <canvas id="lifeChart" aria-label="Lebenserwartung Liniendiagramm" role="img"></canvas>
        </div>
        <div class="actions">
          <button
            class="animate-button"
            type="button"
            aria-label="Diagramm-Animation starten"
            title="Animation starten"
          ></button>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
